# crag Anchor — docker compose (WS-P packaging, 2026-07-17)
#
# One-command daemon deploy on Linux/macOS/Windows with Docker:
#   docker compose -f packaging/docker/docker-compose.yml up -d --build
#
# The build context is the REPO ROOT (two levels up) so the image can COPY the
# whole tree (crag_anchor shims execute the app scripts from the checkout).
#
# SQLite is the default store — a single named volume holds the DB + logs +
# embedding model cache. No external DB service required.

services:
  crag-anchor:
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile.daemon
    image: crag-anchor:local
    container_name: crag-anchor
    restart: unless-stopped

    # Localhost-only bind on the HOST (matches the bare-metal 127.0.0.1:8786
    # contract). The container listens on 0.0.0.0:8786 internally; this mapping
    # exposes it only to the host loopback.
    ports:
      - "127.0.0.1:8786:8786"

    volumes:
      # CRAG_ANCHOR_HOME — DB (engine.db + -wal/-shm), logs/, and the embedding model
      # cache all persist here across container rebuilds.
      - crag-anchor-data:/data

    environment:
      CRAG_ANCHOR_HOME: /data
      CRAG_ANCHOR_DB_PATH: /data/db/engine.db
      CRAG_ANCHOR_LOG_DIR: /data/logs
      CRAG_ANCHOR_DAEMON_HOST: 0.0.0.0
      CRAG_ANCHOR_DAEMON_PORT: 8786
      # Team/server grounding mode: uncomment + supply a key via env_file to use
      # the Anthropic first-party API instead of the default local oauth path.
      # CRAG_ANCHOR_GROUNDING_PROVIDER: anthropic-api
    # env_file:
    #   - ./crag-anchor.env      # ANTHROPIC_API_KEY=... (NEVER commit this file)

    # Structural memory ceiling: the embedding model + FastAPI process fit
    # comfortably under 1g; cap it so a leak can't starve the host.
    mem_limit: 1g

    # start_period 120s: the embedding model warm-up on first boot can take
    # >60s; do not flap the container as unhealthy during warm-up.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8786/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  crag-anchor-data:
