name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: model-cache
          key: model-cache-all-minilm-l6-v2
      - name: Install package (all extras)
        run: pip install -e '.[all]'
      - name: Byte-compile everything
        run: python -m compileall -q apps db crag_engine packages scripts
      - name: Timestamp convention gate
        run: python scripts/test-timestamp-convention.py
      - name: Run test suites
        shell: bash
        run: |
          set -euo pipefail
          # Several suites use LIVE_DB = REPO_ROOT/db/engine.db as a read-only
          # SCHEMA SOURCE for their temp fixtures (build_temp_db pattern). On a
          # bare runner that file doesn't exist ("unable to open database
          # file"), and a raw empty file would miss tables ("no such table:
          # entity_links"). Bootstrap a fully-migrated empty engine.db in the
          # checkout — same schema+migrations path the daemon's fresh-DB
          # bootstrap applies. (db/*.db is gitignored; runner-local only.)
          python - <<'BOOTSTRAP'
          import sqlite3, pathlib
          db = pathlib.Path("db/engine.db")
          conn = sqlite3.connect(db)
          conn.executescript(pathlib.Path("db/schema.sql").read_text(encoding="utf-8"))
          for m in sorted(pathlib.Path("db/migrations").glob("*.sql")):
              try:
                  conn.executescript(m.read_text(encoding="utf-8"))
              except sqlite3.OperationalError as e:
                  print(f"migration {m.name}: skipped ({e})")
          conn.commit(); conn.close()
          print("bootstrap schema DB ready:", db)
          BOOTSTRAP
          fail=0
          for t in apps/daemon/tests/test_*.py apps/mcp/tests/test_*.py db/tests/test_*.py; do
            echo "=== $t ==="
            if ! python "$t"; then
              echo "FAILED: $t"
              fail=1
            fi
          done
          exit $fail

  console-e2e:
    # The browser-verification GATE (frontier plan §0, §6): a headless Chromium
    # loads EVERY console route at 375px and 1280px against a REAL daemon booted
    # on a NON-default port over a TEMP fixture DB, and FAILS on any console
    # error. Two prior consoles shipped with runtime render crashes because no
    # browser testing existed anywhere — endpoint curls + tsc cannot catch a
    # render crash. A normal (required-style) job: failing it fails the workflow.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      # The seeder + daemon are pure-stdlib to bootstrap/seed the fixture DB, but
      # the daemon imports fastembed at startup; install the package so the boot
      # matches production. (The console never needs the model to render — the
      # webServer readiness polls /console/modules, not /health.)
      - name: Install engine package (all extras)
        working-directory: .
        run: pip install -e '.[all]'
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: model-cache
          key: model-cache-all-minilm-l6-v2
      - name: npm ci
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/console/package-lock.json') }}
      - name: Install Chromium (+ system deps)
        run: npx playwright install --with-deps chromium
      - name: Run console e2e gate
        run: npx playwright test
      - name: Upload Playwright report + screenshots
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/console/playwright-report
            apps/console/test-results
          retention-days: 14
